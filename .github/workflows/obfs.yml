name: Minimal Obfuscate and Version Update

on:
  push:
    branches: [main]
    paths:
      - '**/index.*'
      - '**/obfs.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install javascript-obfuscator
        run: npm install -g javascript-obfuscator

      - name: Minimal obfuscation
        run: |
          javascript-obfuscator index.js --output _worker.js \
            --compact true \
            --identifier-names-generator hexadecimal \
            --string-array true \
            --string-array-threshold 0.5

      - name: Validate and add version
        run: |
          # Check if file exists and is valid
          if [ ! -s _worker.js ]; then
            echo "❌ Obfuscation failed"
            exit 1
          fi
          
          # Syntax check
          node -c _worker.js || exit 1
          
          # Add version comment
          VERSION_BLOCK="/*\n * Last update: $(date -u '+%Y-%m-%d %H:%M:%S') UTC\n * We are all REvil - version based on commit ${{ github.sha }}\n */"
          {
            printf '%b\n\n' "$VERSION_BLOCK"
            cat _worker.js
          } > _worker_temp.js
          mv _worker_temp.js _worker.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _worker.js
          git commit -m "Automated build: obfuscation and version update" -m "Based on commit ${{ github.sha }}" || echo "No changes to commit."
          git push origin ${{ github.ref }}
