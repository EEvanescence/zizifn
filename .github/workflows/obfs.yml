name: Simple Obfuscation (Working)

on:
  push:
    branches: [main]
    paths:
      - '**/index.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simple_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install javascript-obfuscator
        run: npm install -g javascript-obfuscator

      - name: Simple safe obfuscation
        run: |
          echo "🔧 Applying minimal obfuscation..."
          javascript-obfuscator index.js --output _worker.js \
            --compact true \
            --identifier-names-generator hexadecimal \
            --disable-console-output false \
            --self-defending false

      - name: Validate and finalize
        run: |
          if [ ! -s _worker.js ]; then
            echo "❌ Obfuscation failed - empty file"
            exit 1
          fi
          
          echo "📊 Original size: $(wc -c < index.js) bytes"
          echo "📊 Obfuscated size: $(wc -c < _worker.js) bytes"
          
          if ! node -c _worker.js; then
            echo "❌ Syntax error in obfuscated file"
            exit 1
          fi
          
          echo "✅ Obfuscation successful"
          
          # Add version comment
          VERSION_BLOCK="/*\n * REvil Worker - Last update: $(date -u '+%Y-%m-%d %H:%M:%S') UTC\n * Build: ${{ github.sha }}\n */"
          {
            printf '%b\n\n' "$VERSION_BLOCK"
            cat _worker.js
          } > _worker_temp.js
          mv _worker_temp.js _worker.js

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _worker.js
          git commit -m "Safe obfuscation build" || echo "No changes to commit."
          git push
